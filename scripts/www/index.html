<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TXT阅读器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 1.5rem;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .btn-primary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            margin-left: 8px;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            background: #F5E6CC;
            padding: 40px;
        }
        .welcome {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }
        .welcome h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .text-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 18px;
            line-height: 1.6;
        }
        #fileInput {
            display: none;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 25px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .setting {
            margin-bottom: 20px;
        }
        .setting label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .setting input[type="range"] {
            width: calc(100% - 60px);
            margin-right: 10px;
        }
        .setting span {
            display: inline-block;
            width: 50px;
            text-align: right;
        }
        .colors {
            display: flex;
            gap: 15px;
        }
        .color-btn {
            width: 50px;
            height: 50px;
            border: 3px solid transparent;
            border-radius: 12px;
            cursor: pointer;
        }
        .color-btn.active {
            border-color: #667eea;
        }
        .drop-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 20px;
            margin-top: 30px;
            text-align: center;
            color: #666;
        }
        .drop-area.dragover {
            background: rgba(102, 126, 234, 0.1);
            border-color: #764ba2;
        }
        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }
        .loading p {
            color: #666;
            margin-top: 15px;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>TXT阅读器</h1>
            <div>
                <button class="btn btn-primary" onclick="openFile()">打开文件</button>
                <button class="btn btn-primary" onclick="openSettings()">设置</button>
            </div>
        </div>
        <div class="content" id="content">
            <div class="welcome" id="welcome">
                <h2>选择一个TXT文件开始阅读</h2>
                <button class="btn btn-primary" onclick="openFile()">选择文件</button>
                <div class="drop-area" id="dropArea">
                    或者直接拖放TXT文件到这里
                </div>
            </div>
            <div id="text" style="display: none;" class="text-content"></div>
            <div id="loading" style="display: none;" class="loading">
                <div class="loading-spinner"></div>
                <p id="loadingText">正在加载中...</p>
            </div>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2>阅读设置</h2>
                <button class="btn" onclick="closeSettings()">✕</button>
            </div>
            <div class="setting">
                <label>字体大小</label>
                <input type="range" id="fontSize" min="12" max="36" value="18" oninput="applySettings()">
                <span id="fontSizeVal">18px</span>
            </div>
            <div class="setting">
                <label>行间距</label>
                <input type="range" id="lineSpacing" min="1" max="4" step="0.1" value="1.6" oninput="applySettings()">
                <span id="lineSpacingVal">1.6</span>
            </div>
            <div class="setting">
                <label>字间距</label>
                <input type="range" id="letterSpacing" min="-2" max="10" step="0.5" value="0" oninput="applySettings()">
                <span id="letterSpacingVal">0px</span>
            </div>
            <div class="setting">
                <label>背景颜色</label>
                <div class="colors">
                    <button class="color-btn active" style="background: #F5E6CC;" onclick="setColor('beige')"></button>
                    <button class="color-btn" style="background: #E8F5E9;" onclick="setColor('green')"></button>
                    <button class="color-btn" style="background: #E3F2FD;" onclick="setColor('blue')"></button>
                    <button class="color-btn" style="background: #121212;" onclick="setColor('black')"></button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".txt">

    <script>
        let currentColor = 'beige';
        const colors = {
            beige: { bg: '#F5E6CC', text: '#212121' },
            green: { bg: '#E8F5E9', text: '#212121' },
            blue: { bg: '#E3F2FD', text: '#212121' },
            black: { bg: '#121212', text: '#F5F5F5' }
        };
        var abortLoading = false;

        function openFile() {
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                loadFile(file);
            }
        });

        function loadFile(file) {
            var textEl = document.getElementById('text');
            var welcomeEl = document.getElementById('welcome');
            var loadingEl = document.getElementById('loading');
            var loadingText = document.getElementById('loadingText');

            abortLoading = false;
            textEl.textContent = '';
            textEl.style.display = 'none';
            welcomeEl.style.display = 'none';
            loadingEl.style.display = 'flex';

            var chunkSize = 512 * 1024;
            var offset = 0;
            var totalSize = file.size;
            var decoder = new TextDecoder('UTF-8');

            loadingText.textContent = '正在加载 0%';

            function readNextChunk() {
                if (abortLoading) return;

                var blob = file.slice(offset, offset + chunkSize);
                var reader = new FileReader();

                reader.onload = function(e) {
                    if (abortLoading) return;

                    offset += chunkSize;
                    var chunk = e.target.result;
                    textEl.textContent += chunk;

                    var progress = Math.min(100, Math.round(offset / totalSize * 100));
                    loadingText.textContent = '正在加载 ' + progress + '%';

                    if (offset < totalSize) {
                        setTimeout(readNextChunk, 0);
                    } else {
                        loadingEl.style.display = 'none';
                        textEl.style.display = 'block';
                        applySettings();
                    }
                };

                reader.onerror = function() {
                    if (!abortLoading) {
                        loadingEl.style.display = 'none';
                        welcomeEl.style.display = 'flex';
                        alert('文件读取失败，请重试');
                    }
                };

                reader.readAsText(blob, 'UTF-8');
            }

            setTimeout(readNextChunk, 50);
        }

        function openSettings() {
            document.getElementById('settingsModal').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('show');
        }

        function setColor(color) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            applySettings();
        }

        function applySettings() {
            var fontSize = document.getElementById('fontSize').value;
            var lineSpacing = document.getElementById('lineSpacing').value;
            var letterSpacing = document.getElementById('letterSpacing').value;

            document.getElementById('fontSizeVal').textContent = fontSize + 'px';
            document.getElementById('lineSpacingVal').textContent = lineSpacing;
            document.getElementById('letterSpacingVal').textContent = letterSpacing + 'px';

            var textEl = document.getElementById('text');
            var contentEl = document.getElementById('content');

            textEl.style.fontSize = fontSize + 'px';
            textEl.style.lineHeight = lineSpacing;
            textEl.style.letterSpacing = letterSpacing + 'px';

            contentEl.style.background = colors[currentColor].bg;
            textEl.style.color = colors[currentColor].text;
        }

        var dropArea = document.getElementById('dropArea');

        dropArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            dropArea.classList.add('dragover');
        });

        dropArea.addEventListener('dragleave', function() {
            dropArea.classList.remove('dragover');
        });

        dropArea.addEventListener('drop', function(e) {
            e.preventDefault();
            dropArea.classList.remove('dragover');
            var file = e.dataTransfer.files[0];
            if (file && (file.type === 'text/plain' || file.name.endsWith('.txt'))) {
                loadFile(file);
            } else {
                alert('请拖入 TXT 文件');
            }
        });
    </script>
</body>
</html>
